<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SugoNow Admin</title>
<style>
  :root{
    --dark:#0F6E56; --green:#1D9E75; --gold:#C9A227; --light:#E1F5EE;
    --bg:#F2F5F4; --card:#fff; --text:#1d2521; --muted:#6b7b74;
    --line:#e3eae7; --red:#A32D2D; --amber:#BA7517; --blue:#185FA5;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
    background:var(--bg);color:var(--text);font-size:14px}
  /* ---- Login ---- */
  #login{position:fixed;inset:0;background:linear-gradient(135deg,#0B5E49,#1D9E75);
    display:flex;align-items:center;justify-content:center;z-index:100}
  .login-box{background:#fff;border-radius:18px;padding:38px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
  .login-box h1{font-size:26px;color:var(--dark);margin-bottom:4px}
  .login-box .sub{color:var(--muted);font-size:13px;margin-bottom:22px}
  .login-box label{display:block;font-size:11px;font-weight:700;color:var(--muted);
    letter-spacing:.5px;margin:14px 0 5px}
  .login-box input{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;font-size:15px}
  .login-box button{width:100%;margin-top:22px;padding:13px;background:var(--green);color:#fff;
    border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
  .login-box button:hover{background:var(--dark)}
  .login-err{color:var(--red);font-size:13px;margin-top:12px;min-height:18px}
  /* ---- Layout ---- */
  #app{display:none;height:100vh}
  .shell{display:flex;height:100vh}
  .sidebar{width:230px;background:var(--dark);color:#fff;flex-shrink:0;display:flex;flex-direction:column;overflow-y:auto}
  .brand{padding:20px 18px;font-size:20px;font-weight:800;border-bottom:1px solid rgba(255,255,255,.12)}
  .brand .badge{display:inline-block;width:30px;height:30px;background:#fff;color:var(--dark);
    border-radius:50%;text-align:center;line-height:30px;font-weight:900;margin-right:8px}
  .nav{flex:1;padding:10px 0}
  .nav a{display:flex;align-items:center;gap:11px;padding:12px 18px;color:#CDEBE0;
    text-decoration:none;font-size:14px;cursor:pointer;border-left:3px solid transparent}
  .nav a:hover{background:rgba(255,255,255,.06)}
  .nav a.active{background:rgba(255,255,255,.12);border-left-color:var(--gold);color:#fff;font-weight:700}
  .nav a .pill{margin-left:auto;background:#E0245E;color:#fff;font-weight:800;font-size:11px;min-width:18px;text-align:center;border-radius:9px;padding:1px 6px;
    font-weight:800;border-radius:10px;padding:1px 8px;min-width:20px;text-align:center}
  .sidebar .foot{padding:14px 18px;border-top:1px solid rgba(255,255,255,.12);font-size:12px;color:#9FC9BB}
  .logout{color:#fff;cursor:pointer;text-decoration:underline;margin-top:6px;display:inline-block}
  .main{flex:1;overflow-y:auto;padding:24px 28px}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
  .topbar h2{font-size:22px;color:var(--dark)}
  .refresh{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:8px 14px;
    cursor:pointer;font-size:13px;font-weight:600;color:var(--blue)}
  /* ---- Cards / tables ---- */
  .grid{display:grid;gap:14px}
  .stat-grid{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px}
  .stat .num{font-size:30px;font-weight:800;color:var(--dark)}
  .stat .lbl{font-size:12px;color:var(--muted);margin-top:3px}
  .live-grid{grid-template-columns:repeat(3,1fr);margin-bottom:8px}
  .live{background:#F2FAF7;border:1px solid #D6EFE6;border-radius:14px;padding:16px;text-align:center}
  .live .num{font-size:32px;font-weight:800}
  .live .lbl{font-size:12px;color:var(--muted);margin-top:2px}
  .section{font-size:13px;font-weight:800;color:var(--dark);text-transform:uppercase;
    letter-spacing:.5px;margin:22px 0 10px}
  table{width:100%;border-collapse:collapse;background:var(--card);border-radius:12px;overflow:hidden;
    border:1px solid var(--line)}
  th{background:var(--green);color:#fff;text-align:left;padding:11px 13px;font-size:12px;font-weight:700}
  td{padding:11px 13px;border-top:1px solid var(--line);font-size:13.5px}
  tr:nth-child(even) td{background:#F8FBFA}
  .btn{border:none;border-radius:8px;padding:7px 13px;font-size:12.5px;font-weight:700;cursor:pointer;margin-right:5px}
  .btn-green{background:var(--green);color:#fff}
  .btn-red{background:#FCEBEB;color:var(--red)}
  .btn-amber{background:#FCEFD6;color:var(--amber)}
  .btn-blue{background:#E3EFFB;color:var(--blue)}
  .btn-gold{background:var(--gold);color:#fff}
  .btn:hover{opacity:.85}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px}
  .tag{font-size:11px;font-weight:800;border-radius:10px;padding:2px 9px}
  .tag-on{background:#E7F6EF;color:#0F6E56}
  .tag-off{background:#FCEBEB;color:var(--red)}
  .tag-busy{background:#E3EFFB;color:var(--blue)}
  .tag-gold{background:#F7EFD6;color:#8A6D1B}
  .empty{color:var(--muted);font-style:italic;padding:24px;text-align:center}
  .loading{color:var(--muted);padding:24px;text-align:center}
  .toolbar{display:flex;gap:10px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
  .toolbar input,.toolbar select{padding:9px 12px;border:1px solid var(--line);border-radius:8px;font-size:13px}
  .subtab{display:inline-block;padding:7px 14px;border-radius:18px;background:#fff;border:1px solid var(--line);
    cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);margin-right:7px}
  .subtab.active{background:var(--green);color:#fff;border-color:var(--green)}
  .field{display:flex;gap:8px;align-items:center;margin-bottom:9px}
  .field label{width:230px;font-size:13px}
  .field input{padding:8px 10px;border:1px solid var(--line);border-radius:7px;width:110px;text-align:center}
  .note{font-size:12px;color:var(--muted);font-style:italic;margin:6px 0}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--dark);color:#fff;padding:13px 20px;
    border-radius:10px;font-size:14px;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:200;opacity:0;
    transition:opacity .25s;pointer-events:none}
  .toast.show{opacity:1}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login">
  <div class="login-box">
    <h1>SugoNow</h1>
    <div class="sub">Admin Control Panel</div>
    <label>MOBILE NUMBER</label>
    <input id="li-mobile" type="text" placeholder="09XXXXXXXXX" autocomplete="username">
    <label>PASSWORD</label>
    <input id="li-pass" type="password" placeholder="Your admin password" autocomplete="current-password">
    <button onclick="doLogin()">Log in</button>
    <div class="login-err" id="li-err"></div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app">
  <div class="shell">
    <div class="sidebar">
      <div class="brand"><span class="badge">S</span>SugoNow</div>
      <div class="nav" id="nav"></div>
      <div class="foot">
        <div id="who"></div>
        <span class="logout" onclick="logout()">Log out</span>
      </div>
    </div>
    <div class="main">
      <div class="topbar">
        <h2 id="page-title">Overview</h2>
        <button class="refresh" onclick="renderTab(CURRENT)">↻ Refresh</button>
      </div>
      <div id="content"><div class="loading">Loading…</div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ====================== CONFIG ======================
// Served from the same origin as the API, so this works automatically.
const API = location.origin + '/api/v1';
let TOKEN = sessionStorage.getItem('sn_admin_token') || null;
let CURRENT = 'overview';
let liveTimer = null;

const TABS = [
  ['overview','📊','Overview'],
  ['approvals','✅','Approvals'],
  ['drivers','🛺','Drivers'],
  ['merchants','🏪','Merchants'],
  ['catalog','📦','Stores & Products'],
  ['bookings','📋','Bookings'],
  ['issues','🚨','Issues'],
  ['money','💰','Fares & Fees'],
  ['growth','🚀','Growth & Wallets'],
  ['insights','📈','Insights'],
  ['users','👥','Users'],
  ['landmarks','📍','Landmarks'],
];

// ====================== HELPERS ======================
const h = (s)=>({Authorization:'Bearer '+TOKEN});
const peso = (n)=>'₱'+(parseFloat(n||0)).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const esc = (s)=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
// jsq: safe for a value placed inside a single-quoted JS string in an inline
// handler, e.g. onclick="fn('${jsq(name)}')". Backslash-escapes \ and ' for the
// JS string, then HTML-escapes the rest so the attribute itself can't break.
// Fixes store/driver names containing an apostrophe (e.g. "Lola's Store").
const jsq = (s)=>String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);}
async function api(path, opts={}){
  const r = await fetch(API+path, {...opts, headers:{...h(), 'Content-Type':'application/json', ...(opts.headers||{})}});
  if(r.status===401||r.status===403){logout();throw new Error('Session expired');}
  const data = await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(data.message||('Error '+r.status));
  return data;
}
const get = (p)=>api(p);
const post = (p,body)=>api(p,{method:'POST',body:JSON.stringify(body||{})});
const patch = (p,body)=>api(p,{method:'PATCH',body:JSON.stringify(body||{})});
const del = (p)=>api(p,{method:'DELETE'});

// ====================== LOGIN ======================
async function doLogin(){
  const mobile = document.getElementById('li-mobile').value.trim();
  const password = document.getElementById('li-pass').value;
  const err = document.getElementById('li-err');
  err.textContent='';
  console.log('[admin] login clicked. API base =', API);
  // Guard: the panel must be opened THROUGH the backend, not as a file://
  if(location.protocol === 'file:'){
    err.innerHTML = 'Open this page through your server:<br><b>http://localhost:3000/admin</b><br>(not by double-clicking the file).';
    return;
  }
  if(!mobile||!password){err.textContent='Enter mobile and password.';return;}
  try{
    const r = await fetch(API+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({mobile,password})});
    let data={};
    try{ data = await r.json(); }catch(_){}
    console.log('[admin] login response', r.status, data);
    if(!r.ok){err.textContent=data.message||('Login failed (HTTP '+r.status+').');return;}
    if(data.user && data.user.role!=='admin'){err.textContent='This account is not an admin.';return;}
    if(!data.token){err.textContent='No token returned — check the account is an admin.';return;}
    TOKEN = data.token;
    sessionStorage.setItem('sn_admin_token',TOKEN);
    sessionStorage.setItem('sn_admin_name',data.user?.full_name||'Admin');
    startApp();
  }catch(e){
    console.error('[admin] login error', e);
    err.innerHTML = 'Could not reach the server at <b>'+API+'</b>.<br>Make sure the server is running and you opened this at http://localhost:3000/admin';
  }
}
function logout(){
  TOKEN=null;sessionStorage.removeItem('sn_admin_token');
  if(liveTimer)clearInterval(liveTimer);
  document.getElementById('app').style.display='none';
  document.getElementById('login').style.display='flex';
}
function startApp(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('who').textContent = sessionStorage.getItem('sn_admin_name')||'Admin';
  buildNav();
  go('overview');
  pollNotifs();                          // initial badge load
  setInterval(pollNotifs, 20000);        // refresh badges + alert sound every 20s
}
function buildNav(){
  const nav=document.getElementById('nav');
  nav.innerHTML = TABS.map(([k,icon,label])=>
    `<a id="nav-${k}" onclick="go('${k}')"><span>${icon}</span><span>${esc(label)}</span><span class="pill" id="pill-${k}" style="display:none"></span></a>`
  ).join('');
}
// ====================== ADMIN NOTIFICATIONS (badges + sound) ======================
// Polls pending counts and shows a red pill on each relevant tab. Plays an alert
// sound on every poll while anything is pending, so the admin can't miss it.
// Badges clear automatically when the admin acts (the pending item leaves the queue).
let notifAudio = null;
function ensureNotifAudio(){
  if(!notifAudio){
    // Short alert beep via WebAudio (no external file needed).
    try{
      notifAudio = () => {
        const ctx = new (window.AudioContext||window.webkitAudioContext)();
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.type='sine'; o.frequency.value=880; o.connect(g); g.connect(ctx.destination);
        g.gain.setValueAtTime(0.0001, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.3, ctx.currentTime+0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+0.4);
        o.start(); o.stop(ctx.currentTime+0.42);
      };
    }catch(e){ notifAudio = ()=>{}; }
  }
}
// Map notification counts to tab pills.
function applyNotifPills(n){
  const map = {
    approvals: (n.driver_approvals||0) + (n.merchant_apps||0),
    drivers:   (n.driver_approvals||0),
    merchants: (n.merchant_apps||0) + (n.toppick_requests||0),
    growth:    (n.topups||0),
    money:     (n.pass_payments||0),
    issues:    (n.reports||0) + (n.complaints||0) + (n.helpdesk||0),
  };
  let total = 0;
  for(const k of Object.keys(map)){
    const pill = document.getElementById('pill-'+k);
    if(!pill) continue;
    const c = map[k];
    total += c;
    if(c > 0){ pill.textContent = c; pill.style.display='inline-block'; }
    else { pill.style.display='none'; }
  }
  return total;
}
async function pollNotifs(){
  try{
    const r = await get('/admin/notifications');
    if(!r || r.success===false) return;
    const total = applyNotifPills(r);
    // Sound on EVERY poll while anything is pending (as requested).
    if(total > 0){ ensureNotifAudio(); try{ notifAudio(); }catch(e){} }
    // Reflect total in the page title bar too.
    document.title = total>0 ? `(${total}) SugoNow Admin` : 'SugoNow Admin';
  }catch(e){}
}

function go(tab){
  CURRENT=tab;
  // Acting on a tab clears its pill immediately for snappy feedback (the next
  // poll re-syncs from the server, so it reappears only if items truly remain).
  setTimeout(()=>{ const p=document.getElementById('pill-'+tab); if(p) p.style.display='none'; }, 300);
  document.querySelectorAll('.nav a').forEach(a=>a.classList.remove('active'));
  document.getElementById('nav-'+tab)?.classList.add('active');
  document.getElementById('page-title').textContent = (TABS.find(t=>t[0]===tab)||[])[2]||'';
  if(liveTimer){clearInterval(liveTimer);liveTimer=null;}
  renderTab(tab);
}
function setContent(html){document.getElementById('content').innerHTML=html;}

// ====================== TAB ROUTER ======================
async function renderTab(tab){
  setContent('<div class="loading">Loading…</div>');
  try{
    if(tab==='overview') return renderOverview();
    if(tab==='approvals') return renderApprovals();
    if(tab==='drivers') return renderDrivers();
    if(tab==='merchants') return renderMerchants();
    if(tab==='catalog') return renderCatalog();
    if(tab==='bookings') return renderBookings();
    if(tab==='issues') return renderIssues();
    if(tab==='money') return renderMoney();
    if(tab==='growth') return renderGrowth();
    if(tab==='insights') return renderInsights();
    if(tab==='users') return renderUsers();
    if(tab==='landmarks') return renderLandmarks();
  }catch(e){ setContent('<div class="empty">'+esc(e.message)+'</div>'); }
}
</script>

<script>
// ====================== OVERVIEW ======================
async function renderOverview(){
  const s = await get('/admin/dashboard');
  let cm=null; try{ cm=await get('/admin/commission-report'); }catch(e){}
  const live = `
    <div class="grid live-grid">
      <div class="live"><div class="num" style="color:var(--green)">${s.drivers_online??0}</div><div class="lbl">Drivers online</div></div>
      <div class="live"><div class="num" style="color:var(--blue)">${s.bookings_active??0}</div><div class="lbl">Trips in progress</div></div>
      <div class="live"><div class="num" style="color:var(--amber)">${s.bookings_pending??0}</div><div class="lbl">Searching</div></div>
    </div>
    <div class="note">Auto-refreshes every 15s</div>`;
  const stats = `
    <div class="grid stat-grid">
      <div class="stat"><div class="num">${peso(s.today_revenue)}</div><div class="lbl">Today's revenue</div></div>
      <div class="stat"><div class="num">${s.today_trips??0}</div><div class="lbl">Trips today</div></div>
      <div class="stat"><div class="num">${peso(s.total_commission)}</div><div class="lbl">Commission today</div></div>
      <div class="stat"><div class="num">${s.active_drivers??0}</div><div class="lbl">Active drivers</div></div>
      <div class="stat"><div class="num">${s.total_customers??0}</div><div class="lbl">Customers</div></div>
      <div class="stat"><div class="num">${s.pending_drivers??0}</div><div class="lbl">Pending driver approvals</div></div>
      <div class="stat"><div class="num">${s.empty_wallet_drivers??0}</div><div class="lbl">Empty-wallet drivers</div></div>
      <div class="stat"><div class="num">${s.open_flags??0}</div><div class="lbl">Open fraud flags</div></div>
    </div>`;
  const comm = cm ? `
    <div class="section">💵 SugoNow revenue (commission collected)</div>
    <div class="note">Driver cut = commission + booking fee taken from completed trips. Merchant = fees you've collected from stores. Full breakdown in Insights.</div>
    <div class="grid stat-grid">
      <div class="stat"><div class="num">${peso(cm.total?.month)}</div><div class="lbl">This month — total</div></div>
      <div class="stat"><div class="num">${peso(cm.driver?.month)}</div><div class="lbl">— from drivers</div></div>
      <div class="stat"><div class="num">${peso(cm.merchant?.month)}</div><div class="lbl">— from merchants</div></div>
      <div class="stat"><div class="num" style="color:var(--amber)">${peso(cm.merchant?.outstanding)}</div><div class="lbl">Merchant fees still owed${cm.merchant?.outstanding_stores?` (${cm.merchant.outstanding_stores} stores)`:''}</div></div>
    </div>` : '';
  setContent(`<div class="section">🟢 Live right now</div>${live}
    <div class="section">Today's summary</div>${stats}
    ${comm}
    <div class="section">🛵 Online drivers</div><div id="online-drivers"><div class="loading">Loading…</div></div>`);
  loadOnlineDrivers();
  liveTimer = setInterval(async ()=>{ if(CURRENT==='overview'){ try{await refreshLive();}catch(e){} } }, 15000);
}
async function refreshLive(){
  const s = await get('/admin/dashboard');
  const nums = document.querySelectorAll('.live .num');
  if(nums[0]) nums[0].textContent = s.drivers_online??0;
  if(nums[1]) nums[1].textContent = s.bookings_active??0;
  if(nums[2]) nums[2].textContent = s.bookings_pending??0;
  loadOnlineDrivers();
}
async function loadOnlineDrivers(){
  try{
    const r = await get('/admin/online-drivers');
    const list = r.drivers||[];
    const box = document.getElementById('online-drivers');
    if(!box) return;
    if(!list.length){ box.innerHTML='<div class="empty">No drivers online right now.</div>'; return; }
    box.innerHTML = `<table><tr><th></th><th>Name</th><th>Vehicle</th><th>Last seen</th><th>Status</th></tr>`+
      list.map(d=>{
        const secs=d.seconds_since_ping??0;
        const seen= secs<60?secs+'s ago':Math.floor(secs/60)+'m ago';
        const fresh= secs<30;
        return `<tr><td><span class="dot" style="background:${fresh?'#1D9E75':'#E0A800'}"></span></td>
          <td>${esc(d.name)}</td><td>${esc(d.vehicle_type||'—')}</td><td>${seen}</td>
          <td><span class="tag ${d.on_trip?'tag-busy':'tag-on'}">${d.on_trip?'On trip':'Waiting'}</span></td></tr>`;
      }).join('')+`</table>`;
  }catch(e){}
}

// ====================== APPROVALS (merchant store applications) ======================
let apprTab='pending';
async function renderApprovals(){
  setContent(`<div class="toolbar">
      <span class="subtab ${apprTab==='pending'?'active':''}" onclick="apprTab='pending';renderApprovals()">Pending</span>
      <span class="subtab ${apprTab==='approved'?'active':''}" onclick="apprTab='approved';renderApprovals()">Approved</span>
    </div><div id="appr-body"><div class="loading">Loading…</div></div>`);
  const body=document.getElementById('appr-body');
  try{
    const r = await get('/merchant/admin/applications?status='+apprTab);
    const list = r.applications||r.businesses||[];
    if(!list.length){ body.innerHTML='<div class="empty">No '+apprTab+' store applications.</div>'; return; }
    body.innerHTML = `<table><tr><th>Store</th><th>Owner</th><th>Mobile</th><th>Category</th><th>Fee</th><th>Action</th></tr>`+
      list.map(m=>{
        const fee = m.commission_type==='percent'?(m.commission_value+'%'):m.commission_type==='flat'?('₱'+m.commission_value+' flat'):'—';
        return `<tr>
          <td><b>${esc(m.name)}</b></td>
          <td>${esc(m.owner_name||m.full_name||'—')}</td>
          <td>${esc(m.contact_mobile||m.mobile||'—')}</td>
          <td>${esc(m.category||'—')}</td>
          <td>${apprTab==='approved'?fee:'—'}</td>
          <td>${ apprTab==='pending' ?
            `<button class="btn btn-green" onclick="approveMerchant('${m.id}','${jsq(m.name)}')">✓ Approve</button>
             <button class="btn btn-red" onclick="rejectMerchant('${m.id}')">✕ Reject</button>`
            : `<button class="btn btn-amber" onclick="suspendMerchant('${m.id}')">Suspend</button>` }
          </td></tr>`;
      }).join('')+`</table>`;

async function approveMerchant(id,name){
  // Approve the store. This is the REAL approve endpoint: it sets the store to
  // 'approved', makes it visible to customers, sets the fee model + free window,
  // and texts the merchant. (The old code called activate-fees, which only set
  // the fee and left the store PENDING.)
  const type = prompt('Fee model for "'+name+'": type "flat", "percent", or "none"','flat');
  if(type===null) return;
  let value=0;
  if(type==='flat'||type==='percent'){
    const v=prompt(type==='flat'?'Flat fee per order (₱):':'Commission percent (%):', type==='flat'?'5':'15');
    if(v===null) return; value=parseFloat(v)||0;
  }
  const fm=prompt('Free (no-fee) months before the fee starts:', '1');
  if(fm===null) return;
  try{
    await post('/merchant/admin/'+id+'/approve',
      {commission_type:type, commission_value:value, free_months:parseInt(fm)||0});
    toast('✓ '+name+' approved'); renderApprovals();
  }catch(e){ toast(e.message); }
}

  try{ await post('/merchant/admin/'+id+'/reject'); toast('Rejected'); renderApprovals(); }catch(e){ toast(e.message); } }

async function walletAdjust(id,name){
  const dir=document.getElementById('w-dir').value;
  const amt=parseFloat(document.getElementById('w-amt').value);
  if(!amt||amt<=0){toast('Enter an amount greater than 0');return;}
  const reason=(document.getElementById('w-reason').value||'').trim();
  if(reason.length<3){toast('A short reason is required (min 3 letters)');return;}
  if(dir==='debit' && !confirm('Debit (remove) ₱'+amt+' from '+name+'\'s wallet?'))return;
  try{
    const r=await post('/admin/driver-wallet/'+id+'/adjust',{amount:amt, direction:dir, reason});
    toast(r.message||'Wallet updated'); driverWallet(id,name);
  }catch(e){ toast(e.message); }
}
async function walletCashout(id,name){
  const amt=parseFloat(document.getElementById('w-cashamt').value);
  if(!amt||amt<=0){toast('Enter an amount greater than 0');return;}
  if(!confirm('Confirm you handed ₱'+amt+' cash to '+name+'? This subtracts it from their wallet.'))return;
  try{
    const r=await post('/admin/driver-wallet/'+id+'/cashout',{amount:amt});
    toast(r.message||'Cash-out recorded'); driverWallet(id,name);
  }catch(e){ toast(e.message); }
}

async function changeCategory(id,name){

  catch(e){ toast(e.message); }

async function setMerchantFee(id,name){
  const type=prompt('Fee type for '+name+'? Type: percent, flat, or none','percent');
  if(type===null)return;
  if(!['percent','flat','none'].includes(type.trim())){toast('Type must be percent, flat, or none');return;}
  let val=0;
  if(type.trim()!=='none'){
    const v=prompt(type.trim()==='percent'?'Commission percent (e.g. 15)':'Flat ₱ per order (e.g. 5)','');
    if(v===null)return; val=parseFloat(v); if(isNaN(val)||val<0){toast('Enter a valid number');return;}
  }
  const eff=prompt('Effective date (YYYY-MM-DD) — leave blank for today. This is the prior-notice date shown to the merchant.','');
  if(eff===null)return;
  try{ await post('/merchant/admin/'+id+'/activate-fees',{commission_type:type.trim(),commission_value:val,effective_date:eff.trim()||undefined});
    toast('Fee set'); renderMerchants(); }catch(e){ toast(e.message); }

async function featureMerchant(id,name){
  const mo=prompt('Feature "'+name+'" as Top Pick for how many months?','1');

  try{ await post('/merchant/admin/'+id+'/feature',{months}); toast('Featured'); renderMerchants(); }catch(e){ toast(e.message); }

async function payAction(id,action){
  if(action==='reject' && !confirm('Reject this payment?'))return;
  try{ await post('/merchant/admin/fee-payments/'+id+'/'+action,{}); toast(action==='approve'?'Payment approved':'Rejected'); renderMerchants(); }
  catch(e){
    // Approve may return a reused-reference warning — offer to force.
    if(action==='approve' && /reference/i.test(e.message) && confirm(e.message+'\n\nApprove anyway?')){
      try{ await post('/merchant/admin/fee-payments/'+id+'/approve',{force:true}); toast('Payment approved'); renderMerchants(); }catch(e2){ toast(e2.message); }
    } else { toast(e.message); }
  }
}

        <td>${b.product_count} product${b.product_count===1?'':'s'}</td>
        <td><button class="btn btn-blue" onclick="catalogProducts('${b.id}','${jsq(b.name)}')">Products</button></td>
      </tr>`;
    }).join('');
    setContent(`
      <div class="toolbar">
        <button class="btn btn-green" onclick="showAddBiz()">+ Add business</button>
      </div>
      <div class="note">Every business is listed: 🟢 "Merchant" = signed up through the app (pending ones shown first); 🔵 "Admin-added" = you created it here. Nothing is hidden from this list.</div>
      <div id="addbiz-form"></div>
      <table><tr><th>Store</th><th>Source</th><th>Status</th><th>Products</th><th></th></tr>${rows||'<tr><td colspan=5 class=empty>No businesses yet.</td></tr>'}</table>`);
  }catch(e){ setContent('<div class="empty">'+esc(e.message)+'</div>'); }
}
function showAddBiz(){
  document.getElementById('addbiz-form').innerHTML = `
    <div class="card" style="max-width:520px;margin:10px 0">
      <div class="section" style="margin-top:0">Add a new business</div>
      <div class="field"><label>Business name</label><input id="nb-name" placeholder="e.g. Aling Rosa Carinderia"></div>
      <div class="field"><label>Category</label>
        <select id="nb-cat"><option>Food</option><option>Grocery</option><option>Bakery</option><option>Pharmacy</option><option>Other</option></select></div>
      <div class="field"><label>Address / landmark</label><input id="nb-addr" placeholder="e.g. Poblacion East, near plaza"></div>
      <div class="field"><label>Delivery fee (₱)</label><input id="nb-fee" type="number" value="30">
        <button class="btn btn-green" onclick="addBiz()">Create business</button></div>
    </div>`;
}
async function addBiz(){
  const name=document.getElementById('nb-name').value.trim();
  const category=document.getElementById('nb-cat').value;
  if(!name){toast('Enter a business name');return;}
  try{
    await post('/admin/businesses',{name,category,
      address:document.getElementById('nb-addr').value.trim(),
      delivery_fee:parseFloat(document.getElementById('nb-fee').value)||30});
    toast('Business created'); renderCatalog();
  }catch(e){ toast(e.message); }
}
function catalogProducts(id, name){
  catalogView = { mode:'products', biz: { id, name } };
  renderCatalog();
}
async function renderCatalogProducts(){
  const biz = catalogView.biz;
  setContent('<div class="loading">Loading…</div>');
  try{
    const r = await get('/admin/businesses/'+biz.id+'/products'); const list=r.products||[];
    const rows = list.map(p=>`<tr><td>${esc(p.name)}</td><td>${peso(p.price)}</td>
      <td><button class="btn btn-red" onclick="delProduct('${p.id}')">Delete</button></td></tr>`).join('');
    setContent(`
      <button class="btn btn-blue" onclick="catalogView={mode:'list',biz:null};renderCatalog()">← Back to stores</button>
      <div class="section">${esc(biz.name)} — products</div>
      <div class="card" style="max-width:520px;margin-bottom:12px">
        <div class="field"><label>Product name</label><input id="np-name" placeholder="e.g. Chicken Adobo"></div>
        <div class="field"><label>Price (₱)</label><input id="np-price" type="number" placeholder="e.g. 60">
          <button class="btn btn-green" onclick="addProduct('${biz.id}')">+ Add product</button></div>
      </div>
      <table><tr><th>Product</th><th>Price</th><th></th></tr>${rows||'<tr><td colspan=3 class=empty>No products yet.</td></tr>'}</table>`);
  }catch(e){ setContent('<div class="empty">'+esc(e.message)+'</div>'); }
}
async function addProduct(bizId){
  const name=document.getElementById('np-name').value.trim();
  const price=parseFloat(document.getElementById('np-price').value);
  if(!name||!(price>=0)){toast('Enter product name and price');return;}
  try{ await post('/admin/businesses/'+bizId+'/products',{name,price}); toast('Product added'); renderCatalogProducts(); }
  catch(e){ toast(e.message); }
}
async function delProduct(id){
  if(!confirm('Delete this product?'))return;
  try{ await del('/admin/products/'+id); toast('Deleted'); renderCatalogProducts(); }
  catch(e){ toast(e.message); }
}

// ====================== BOOKINGS ======================
let bookingsSub='all';
async function renderBookings(){
  setContent(`<div class="toolbar">
      <span class="subtab ${bookingsSub==='all'?'active':''}" onclick="bookingsSub='all';renderBookings()">📋 All bookings</span>
      <span class="subtab ${bookingsSub==='missed'?'active':''}" onclick="bookingsSub='missed';renderBookings()">❌ Missed / no-driver</span>
    </div><div id="bk-body"><div class="loading">Loading…</div></div>`);
  const body=document.getElementById('bk-body');
  try{
    if(bookingsSub==='missed'){
      const r=await get('/admin/missed-bookings'); const list=r.bookings||[];
      const reasonLabel=(x)=> x==='no_driver'?'🚫 No driver available'
        : x==='cancelled_after_assign'?'↩️ Cancelled after a driver accepted'
        : '✖️ Cancelled before dispatch';
      const banner=`<div class="live" style="margin-bottom:12px"><div class="num" style="color:var(--amber)">${r.no_driver_count||0}</div><div class="lbl">orders with NO driver (of last ${list.length} cancelled)</div></div>`;
      body.innerHTML = banner + (list.length? `<table><tr><th>When</th><th>Service</th><th>Customer</th><th>Reason</th><th>Amount</th></tr>`+
        list.map(b=>`<tr>
          <td>${b.created_at?new Date(b.created_at).toLocaleString():'—'}</td>
          <td>${esc(b.service_type||'—')}</td>
          <td>${esc(b.customer_name||'—')}${b.customer_mobile?'<br><small style="color:#888">'+esc(b.customer_mobile)+'</small>':''}</td>
          <td>${reasonLabel(b.miss_reason)}</td>
          <td>${peso(b.final_fare||b.estimated_fare)}</td>
        </tr>`).join('')+`</table>` : '<div class="empty">No missed bookings 🎉</div>');
      return;
    }
    const r = await get('/admin/bookings'); const list = r.bookings||[];
    body.innerHTML = list.length? `<table><tr><th>When</th><th>Service</th><th>Customer</th><th>Driver</th><th>Fare</th><th>Status</th></tr>`+
      list.slice(0,200).map(b=>`<tr>
        <td>${b.created_at?new Date(b.created_at).toLocaleString():'—'}</td>
        <td>${esc(b.service_type||'—')}</td>
        <td>${esc(b.customer_name||'—')}</td>
        <td>${esc(b.driver_name||'—')}</td>
        <td>${peso(b.final_fare||b.estimated_fare)}</td>
        <td><span class="tag ${b.status==='completed'?'tag-on':b.status==='cancelled'?'tag-off':'tag-busy'}">${esc(b.status)}</span></td>
      </tr>`).join('')+`</table>` : '<div class="empty">No bookings yet.</div>';
  }catch(e){ body.innerHTML='<div class="empty">Could not load.</div>'; }
}
</script>


<script>
// ====================== ISSUES (reports + system log) ======================
let issuesSub='reports';
async function renderIssues(){
  setContent(`<div class="toolbar">
      <span class="subtab ${issuesSub==='reports'?'active':''}" onclick="issuesSub='reports';renderIssues()">⚠️ Complaints</span>
      <span class="subtab ${issuesSub==='flags'?'active':''}" onclick="issuesSub='flags';renderIssues()">🚩 Fraud flags</span>
      <span class="subtab ${issuesSub==='syslog'?'active':''}" onclick="issuesSub='syslog';renderIssues()">⚙️ System log</span>
    </div><div id="issues-body"><div class="loading">Loading…</div></div>`);
  const body=document.getElementById('issues-body');
  try{
    if(issuesSub==='reports'){
      const r=await get('/admin/reports?resolved=false'); const list=r.reports||[];
      body.innerHTML = list.length? `<table><tr><th>From</th><th>Role</th><th>Category</th><th>Message</th><th>When</th><th></th></tr>`+
        list.map(x=>`<tr><td>${esc(x.full_name||x.user_name||'—')}</td><td>${esc(x.role||'')}</td><td>${esc(x.category||'')}</td>
          <td>${esc(x.message)}</td><td>${x.created_at?new Date(x.created_at).toLocaleDateString():''}</td>
          <td><button class="btn btn-green" onclick="resolveReport('${x.id}')">Resolve</button></td></tr>`).join('')+`</table>`
        : '<div class="empty">No open complaints. ✅</div>';
    } else if(issuesSub==='flags'){
      const r=await get('/admin/fraud-flags'); const list=r.flags||r.fraud_flags||[];
      body.innerHTML = list.length? `<table><tr><th>Type</th><th>Detail</th><th>When</th></tr>`+
        list.map(x=>`<tr><td>${esc(x.flag_type||x.type||'')}</td><td>${esc(x.detail||x.note||x.reason||'')}</td>
          <td>${x.created_at?new Date(x.created_at).toLocaleString():''}</td></tr>`).join('')+`</table>`
        : '<div class="empty">No fraud flags. ✅</div>';
    } else {
      const r=await get('/admin/error-log'); const list=r.errors||[];
      body.innerHTML = `<div class="toolbar"><button class="btn btn-red" onclick="clearSysLog()">Clear log</button></div>`+
        (list.length? `<table><tr><th>Context</th><th>Message</th><th>When</th></tr>`+
        list.map(x=>`<tr><td><b>${esc(x.context)}</b></td><td>${esc(x.message)}</td>
          <td>${x.created_at?new Date(x.created_at).toLocaleString():''}</td></tr>`).join('')+`</table>`
        : '<div class="empty">No background errors. ✅</div>');
    }
  }catch(e){ body.innerHTML='<div class="empty">'+esc(e.message)+'</div>'; }
}
async function resolveReport(id){ try{ await patch('/admin/reports/'+id+'/resolve'); toast('Resolved'); renderIssues(); }catch(e){ toast(e.message); } }
async function clearSysLog(){ if(!confirm('Clear the system log?'))return; try{ await post('/admin/error-log/clear'); toast('Cleared'); renderIssues(); }catch(e){ toast(e.message); } }

// ====================== MONEY (fares & fees) ======================
async function renderMoney(){

  let df=null; try{ df=await get('/admin/delivery-fares'); }catch(e){}
  let fcfg={}; try{ fcfg=await get('/admin/farecfg-settings'); }catch(e){}

  setContent(`
    <div class="section">💳 Payment settings (GCash)</div>

    <div class="section">Commission</div>
    <div class="field"><label>Commission rate (%)</label>
      <input id="m-comm" type="number" value="${cr.rate??cr.commission_rate??15}">
      <button class="btn btn-green" onclick="saveComm()">Save</button></div>
    <div class="section">⚡ Surge / peak pricing</div>
    <div class="note">When ON, all fares are multiplied by the surge rate. Customers see a peak-pricing notice. Same control as the mobile admin.</div>
    <div class="field"><label>Surge active</label>
      <select id="m-surge-active">
        <option value="false" ${sg&&sg.active?'':'selected'}>Off</option>
        <option value="true" ${sg&&sg.active?'selected':''}>On</option>
      </select></div>
    <div class="field"><label>Multiplier (e.g. 1.25 = +25%)</label>
      <input id="m-surge-mult" type="number" step="0.05" value="${(sg&&sg.multiplier)||1.25}"></div>

      <button class="btn btn-green" onclick="saveSurge()">Save surge</button></div>

    <div class="section">Booking fee</div>
    <div class="note">A small per-order fee, deducted from the driver's wallet with the commission at completion (Pass members skip it).</div>
    <div class="field"><label>Booking fee active</label>
      <select id="m-bfee-active">
        <option value="false" ${fs.booking_fee_active?'':'selected'}>Off</option>
        <option value="true" ${fs.booking_fee_active?'selected':''}>On</option>
      </select></div>
    <div class="field"><label>Booking fee (₱)</label>
      <input id="m-bfee" type="number" value="${fs.booking_fee??5}">
      <button class="btn btn-green" onclick="saveBfee()">Save booking fee</button></div>

    <div class="section">SugoPass (subscription)</div>
    <div class="note">When ON, customers can buy a Pass that waives booking fees for a set number of days.</div>
    <div class="field"><label>Pass active</label>
      <select id="m-pass-active">
        <option value="false" ${fs.pass_active?'':'selected'}>Off</option>
        <option value="true" ${fs.pass_active?'selected':''}>On</option>
      </select></div>
    <div class="field"><label>Pass price (₱)</label>
      <input id="m-pass-price" type="number" value="${fs.pass_price??49}"></div>

      <input id="m-pass-days" type="number" value="${fs.pass_days??30}">
      <button class="btn btn-green" onclick="savePass()">Save Pass</button></div>

    <div class="section">Custom errand fee</div>

    <div class="field"><label>Errand premium (₱)</label>

      <button class="btn btn-green" onclick="saveErrand()">Save</button></div>

    <div class="note">Base fare per service + the shared per-km rate. Raise these when fuel/inflation bites. Changes apply to NEW bookings within ~30s and the customer Terms update automatically.</div>

      <input id="m-fare-lpg" type="number" value="${df?.lpg??40}"></div>

// ====================== GROWTH & WALLETS ======================
let growthSub='topups';
async function renderGrowth(){
  setContent(`<div class="toolbar">
      <span class="subtab ${growthSub==='topups'?'active':''}" onclick="growthSub='topups';renderGrowth()">💰 Top-ups</span>
      <span class="subtab ${growthSub==='promos'?'active':''}" onclick="growthSub='promos';renderGrowth()">🎁 Promos</span>
      <span class="subtab ${growthSub==='milestones'?'active':''}" onclick="growthSub='milestones';renderGrowth()">🏆 Bonuses</span>
    </div><div id="growth-body"><div class="loading">Loading…</div></div>`);
  const body=document.getElementById('growth-body');
  try{
    if(growthSub==='topups'){
      const p=await get('/driver-wallet/admin/pending'); const list=p.pending||[];
      body.innerHTML = `<div class="section">Pending top-ups (${list.length})</div>`+
        (list.length? list.map(x=>`<div class="card" style="max-width:620px;margin-bottom:12px">
          <div class="section" style="margin-top:0">${esc(x.full_name)} — ${peso(x.amount)}</div>
          <div class="note">${esc(x.mobile)} · ${x.method==='cash'?'💵 Cash at office':'📱 GCash'}${x.gcash_ref?' · ref '+esc(x.gcash_ref):''} · ${new Date(x.created_at).toLocaleString()}
            ${x.ref_already_used?' · <span class="tag tag-off">⚠ reference reused before</span>':''}</div>
          ${x.method!=='cash'
            ? (x.proof_url
                ? `<a href="${esc(x.proof_url)}" target="_blank"><img src="${esc(x.proof_url)}" style="max-width:260px;max-height:320px;border-radius:8px;border:1px solid #ddd;margin:8px 0;display:block"></a>`
                : '<div class="note" style="margin:8px 0">No screenshot attached.</div>')
            : '<div class="note" style="margin:8px 0">Driver will pay cash at the office — confirm once received.</div>'}
          <div class="toolbar">
            <button class="btn btn-green" onclick="topupApprove('${x.id}')">✓ Approve & credit</button>
            <button class="btn btn-red" onclick="topupReject('${x.id}')">✕ Reject</button>
          </div></div>`).join('')
        : '<div class="empty">No pending top-ups.</div>');
    } else if(growthSub==='promos'){
      const r=await get('/growth/admin/settings'); const st=r.settings||{};
      const tg=(label,key,on)=>`<div class="field" style="align-items:center"><label style="flex:1">${label}</label>`+
        `<button class="btn ${on?'btn-green':''}" onclick="saveGrowthToggle('${key}',${on?'false':'true'})">${on?'ON':'OFF'}</button></div>`;
      const num=(label,key,id,val)=>`<div class="field"><label>${label}</label><input id="${id}" type="number" value="${val??0}"><button class="btn btn-green" onclick="saveGrowth('${key}','${id}')">Save</button></div>`;
      body.innerHTML = `
        <div class="section">Earn-credit (₱ after 1st booking)</div>
        ${tg('Earn-credit active','earn_credit_active',st.earnCreditActive)}
        ${num('Earn-credit amount (₱)','earn_credit_amount','g-earn',st.earnCredit)}

        <div class="section">Referral rewards</div>
        ${tg('Referral rewards active','referral_active',st.referralActive)}
        ${num('Referral amount each side (₱)','referral_amount','g-ref',st.referral)}

        <div class="section">Bundle voucher (LPG/water → free food delivery)</div>
        ${tg('Bundle voucher active','bundle_voucher_active',st.voucherActive)}
        ${num('Voucher valid for (hours)','bundle_voucher_hours','g-vh',st.voucherHours)}

        <div class="section">Driver wallet (pre-paid commission)</div>
        ${tg('Driver wallet active','driver_wallet_active',st.driverWalletActive)}
        ${num('Min driver top-up (₱)','driver_wallet_min_topup','g-mtu',st.driverMinTopup)}

        <div class="section">Driver weekly milestone bonus</div>
        ${tg('Milestone bonus active','milestone_active',st.milestoneActive)}
        ${num('Milestone target trips','milestone_target_trips','g-mt',st.milestoneTrips)}
        ${num('Milestone min rating','milestone_min_rating','g-mr',st.milestoneRating)}
        ${num('Milestone bonus (₱)','milestone_bonus','g-mb',st.milestoneBonus)}`;
    } else {
      const r=await get('/growth/admin/milestones'); const list=r.drivers||[];
      body.innerHTML = `<div class="note">Drivers who hit ${r.target||'—'} trips at ${r.min_rating||'—'}★ qualify for ₱${r.bonus||0}.</div>`+
        (list.length? `<table><tr><th>Driver</th><th>Trips</th><th>Rating</th><th>Action</th></tr>`+
        list.map(x=>`<tr><td>${esc(x.full_name)}</td><td>${x.trips_done}</td><td>${x.rating>0?parseFloat(x.rating).toFixed(1)+'★':'<span class="note">unrated</span>'}</td>
          <td>${x.bonus_paid
                ? '<span class="tag tag-on">Paid this week</span>'
                : x.below_rating
                  ? '<span class="tag tag-busy">Below '+r.min_rating+'★</span>'
                  : `<button class="btn btn-gold" onclick="payMilestone('${x.id}')">Mark ₱${r.bonus} paid</button>`}</td></tr>`).join('')+`</table>`
        : '<div class="empty">No drivers have hit the target yet.</div>');
    }
  }catch(e){ body.innerHTML='<div class="empty">'+esc(e.message)+'</div>'; }
}
async function topupApprove(id){ try{ await post('/driver-wallet/admin/approve/'+id); toast('Approved'); renderGrowth(); }catch(e){ toast(e.message); } }
async function topupReject(id){ try{ await post('/driver-wallet/admin/reject/'+id); toast('Rejected'); renderGrowth(); }catch(e){ toast(e.message); } }
async function saveGrowth(key,inputId){ try{ await post('/growth/admin/settings',{key,value:parseFloat(document.getElementById(inputId).value)}); toast('Saved'); }catch(e){ toast(e.message); } }
async function saveGrowthToggle(key,value){ try{ await post('/growth/admin/settings',{key,value}); toast(value==='true'?'Turned ON':'Turned OFF'); renderGrowth(); }catch(e){ toast(e.message); } }
async function payMilestone(id){ if(!confirm('Mark this week\'s bonus as paid (credit to driver wallet)?'))return; try{ await post('/growth/admin/milestones/'+id+'/pay',{method:'wallet'}); toast('Bonus paid'); renderGrowth(); }catch(e){ toast(e.message); } }

// ====================== INSIGHTS ======================
async function renderInsights(){
  const a = await get('/admin/analytics');
  const o = a.overall||a||{};
  let cm=null; try{ cm=await get('/admin/commission-report'); }catch(e){}
  const row = (label, d, m) => `<tr><td>${label}</td><td>${peso(d)}</td><td>${peso(m)}</td><td><b>${peso((d||0)+(m||0))}</b></td></tr>`;
  const commBlock = cm ? `
    <div class="section">💵 Commission / revenue (SugoNow's earnings)</div>
    <div class="note">Driver = commission + booking fee from completed trips. Merchant = fees collected from stores. This is money RECEIVED, by period.</div>
    <table>
      <tr><th>Period</th><th>From drivers</th><th>From merchants</th><th>Total</th></tr>
      ${row('This week',  cm.driver?.week,      cm.merchant?.week)}
      ${row('This month', cm.driver?.month,     cm.merchant?.month)}
      ${row('Last month', cm.driver?.lastMonth, cm.merchant?.lastMonth)}
      ${row('All-time',   cm.driver?.total_all, cm.merchant?.total_all)}
    </table>
    <div class="grid stat-grid" style="margin-top:12px">
      <div class="stat"><div class="num" style="color:var(--amber)">${peso(cm.merchant?.outstanding)}</div><div class="lbl">Merchant fees still owed (to collect)${cm.merchant?.outstanding_stores?` · ${cm.merchant.outstanding_stores} stores`:''}</div></div>
    </div>` : '';
  setContent(`<div class="grid stat-grid">
      <div class="stat"><div class="num">${o.total_bookings??o.bookings??'—'}</div><div class="lbl">Total bookings</div></div>
      <div class="stat"><div class="num">${peso(o.total_revenue||o.revenue)}</div><div class="lbl">Total revenue (GMV)</div></div>
      <div class="stat"><div class="num">${o.completed??'—'}</div><div class="lbl">Completed</div></div>
      <div class="stat"><div class="num">${o.cancelled??'—'}</div><div class="lbl">Cancelled</div></div>
    </div>
    ${commBlock}
    <div class="note" style="margin-top:12px">Per-driver and per-merchant detail are in the Drivers and Merchants tabs.</div>`);
}

// ====================== USERS ======================
async function renderUsers(){
  let ua=null; try{ ua=await get('/admin/user-analytics'); }catch(e){}
  const overview = ua ? `
    <div class="section">👥 Users overview</div>
    <div class="grid stat-grid">
      <div class="stat"><div class="num" style="color:var(--green)">+${ua.new_today??0}</div><div class="lbl">New today</div></div>
      <div class="stat"><div class="num" style="color:var(--green)">+${ua.new_week??0}</div><div class="lbl">New this week</div></div>
      <div class="stat"><div class="num">${ua.repeat_customers??0}</div><div class="lbl">Repeat customers (2+ orders)</div></div>
      <div class="stat"><div class="num">${ua.active_30d??0}</div><div class="lbl">Booked in last 30 days</div></div>
      <div class="stat"><div class="num">${ua.customers??0} / ${ua.drivers??0} / ${ua.merchants??0}</div><div class="lbl">Customers / Drivers / Merchants</div></div>
      <div class="stat"><div class="num" style="color:var(--red)">${ua.banned??0}</div><div class="lbl">Banned / suspended</div></div>
    </div>` : '';
  setContent(`${overview}
    <div class="section">🔍 Find a user</div>
    <div class="toolbar">
      <input id="u-q" placeholder="Search name or mobile…" style="width:260px">
      <button class="btn btn-green" onclick="searchUsers()">Search</button>
    </div><div id="users-body"><div class="note">Type a name or number and search.</div></div>`);
  document.getElementById('u-q').addEventListener('keydown',e=>{if(e.key==='Enter')searchUsers();});
}
async function searchUsers(){
  const q=document.getElementById('u-q').value.trim();
  const body=document.getElementById('users-body');
  body.innerHTML='<div class="loading">Searching…</div>';
  try{
    const r=await get('/admin/users?search='+encodeURIComponent(q));
    const list=r.users||[];
    body.innerHTML = list.length? `<table><tr><th>Name</th><th>Mobile</th><th>Role</th><th>Status</th><th>Unpaid Fee</th><th>Action</th></tr>`+
      list.map(u=>{
        const fee=parseFloat(u.unpaid_cancel_fee||0);
        const feeCell = fee>0
          ? `<span class="tag tag-off">₱${Math.round(fee)}</span> <button class="btn btn-green" onclick="clearFee('${u.id}')">Mark paid</button>`
          : '<span class="note">—</span>';
        return `<tr><td>${esc(u.full_name)}</td><td>${esc(u.mobile)}</td><td>${esc(u.role)}</td>
        <td>${u.banned?'<span class="tag tag-off">Banned</span>':'<span class="tag tag-on">Active</span>'}</td>
        <td>${feeCell}</td>
        <td>${u.banned?`<button class="btn btn-green" onclick="userAction('${u.id}','unban')">Unban</button>`:`<button class="btn btn-amber" onclick="userAction('${u.id}','ban')">Ban</button>`}${u.role==='customer'?` <button class="btn btn-gold" onclick="grantCredit('${u.id}','${jsq(u.full_name)}')">💳 Credit</button>`:''}</td></tr>`;
      }).join('')+`</table>`
      : '<div class="empty">No users found.</div>';
  }catch(e){ body.innerHTML='<div class="empty">'+esc(e.message)+'</div>'; }
}
async function grantCredit(id,name){
  const amt = prompt('Grant how much credit to '+name+'? (₱)\n\nThis is spendable like cash on ANY service, including food products.','300');
  if(amt===null) return;
  const amount = parseFloat(amt);
  if(isNaN(amount)||amount<=0){ toast('Enter a valid amount'); return; }
  const message = prompt('Message to send '+name+' (shows as a push notification + in their wallet history):','Congratulations! You won \u20b1'+amount+' in the SugoNow lucky draw. \ud83c\udf89 Use it on any service, kasama ang pagkain!');
  if(message===null) return;
  try{ const r=await post('/admin/customer-wallet/'+id+'/grant',{amount, message}); toast(r.message||'Credit granted'); }catch(e){ toast(e.message); }
}
async function userAction(id,action){
  if(action==='unban'){ if(!confirm('Unban this user?'))return;
    try{ await post('/admin/users/'+id+'/unban',{}); toast('Unbanned'); searchUsers(); }catch(e){ toast(e.message); } return; }
  // ban: collect days + reason + message
  const days = prompt('Suspend for how many days? (0 or blank = indefinite)','7');
  if(days===null) return;
  const reason = prompt('Internal reason (for your records):','Violation of the SugoNow terms of use');
  if(reason===null) return;
  const message = prompt('Message to show the user (optional):','');
  if(message===null) return;
  try{ await post('/admin/users/'+id+'/ban',{days:parseInt(days)||0, reason, message}); toast('User suspended'); searchUsers(); }
  catch(e){ toast(e.message); }
}
async function clearFee(id){
  if(!confirm('Mark this cancellation fee as PAID? The customer will be able to book again.'))return;
  try{ await post('/admin/users/'+id+'/clear-cancel-fee',{}); toast('Fee cleared'); searchUsers(); }
  catch(e){ toast(e.message); }
}

// ====================== LANDMARKS ======================
let lmTab='pending';
async function renderLandmarks(){
  setContent(`<div class="toolbar">
      <span class="subtab ${lmTab==='pending'?'active':''}" onclick="lmTab='pending';renderLandmarks()">Pending</span>
      <span class="subtab ${lmTab==='approved'?'active':''}" onclick="lmTab='approved';renderLandmarks()">Approved</span>
      <span class="subtab ${lmTab==='all'?'active':''}" onclick="lmTab='all';renderLandmarks()">All</span>
    </div><div id="lm-body"><div class="loading">Loading…</div></div>`);
  const body=document.getElementById('lm-body');
  try{
    const sp = lmTab==='all'?'':('?status='+lmTab);
    const r=await get('/landmarks/admin/list'+sp); const list=r.landmarks||[];
    body.innerHTML = list.length? `<table><tr><th>Name</th><th>Category</th><th>Coords</th><th>Status</th><th>Action</th></tr>`+
      list.map(l=>`<tr><td><b>${esc(l.name)}</b>${l.address_hint?'<br><span class=note>'+esc(l.address_hint)+'</span>':''}</td>
        <td>${esc(l.category)}</td><td>${parseFloat(l.lat).toFixed(5)}, ${parseFloat(l.lng).toFixed(5)}</td>
        <td><span class="tag ${l.status==='approved'?'tag-on':l.status==='pending'?'tag-busy':'tag-off'}">${esc(l.status)}</span></td>
        <td>${l.status!=='approved'?`<button class="btn btn-green" onclick="lmApprove('${l.id}')">✓</button>`:''}
            ${l.status==='pending'?`<button class="btn btn-amber" onclick="lmReject('${l.id}')">✕</button>`:''}
            <button class="btn btn-red" onclick="lmDelete('${l.id}','${jsq(l.name)}')">🗑</button></td></tr>`).join('')+`</table>`
      : '<div class="empty">No landmarks here.</div>';
  }catch(e){ body.innerHTML='<div class="empty">'+esc(e.message)+'</div>'; }
}
async function lmApprove(id){ try{ await post('/landmarks/admin/'+id+'/approve'); toast('Approved'); renderLandmarks(); }catch(e){ toast(e.message); } }
async function lmReject(id){ try{ await post('/landmarks/admin/'+id+'/reject'); toast('Rejected'); renderLandmarks(); }catch(e){ toast(e.message); } }
async function lmDelete(id,name){ if(!confirm('Delete "'+name+'"?'))return; try{ await del('/landmarks/admin/'+id); toast('Deleted'); renderLandmarks(); }catch(e){ toast(e.message); } }
